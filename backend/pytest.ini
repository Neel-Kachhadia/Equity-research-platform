[pytest]
# Makes pytest collect tests from any test_*.py file
testpaths = tests

# Default markers (avoids PytestUnknownMarkWarning)
markers =
    s3:     Tests that call real AWS S3 (require credentials)
    unit:   Pure Python logic tests — no network calls
    smoke:  Fast subset for CI/CD pipelines

# asyncio mode for any async tests
asyncio_mode = auto

# Short test output by default
addopts = -q --tb=short
